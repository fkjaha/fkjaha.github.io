<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Details - Fkjaha Games</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap"
    rel="stylesheet">
</head>

<body>
  <header class="site-header" id="siteHeader">
    <div class="shell header-shell">
      <a href="index.html" class="brand">
        <div class="brand-text">
          <strong>Fkjaha Games</strong>
        </div>
      </a>
      <nav class="primary-nav">
        <a href="index.html#games">Games</a>
        <a href="played-games.html">Top 50 Games</a>
        <a href="index.html#contact">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="game-detail-hero">
      <div class="shell">
        <h1 id="gameTitle">Loading...</h1>
      </div>
    </section>

    <section class="section">
      <div class="shell">
        <div class="game-info-grid">
          <div class="game-main-content">
            <div id="gameHeader"></div>

            <p class="lead" id="gameDescription"></p>

            <div class="game-metadata" style="margin-top: 48px;">
              <div class="meta-item">
                <label>Genre</label>
                <span id="gameGenreMeta"></span>
              </div>
              <div class="meta-item">
                <label>Developer</label>
                <span id="gameDevelopers"></span>
              </div>
              <div class="meta-item">
                <label>Publisher</label>
                <span id="gamePublishers"></span>
              </div>
              <div class="meta-item">
                <label>Release Date</label>
                <span id="gameReleaseDate"></span>
              </div>
            </div>

            <div class="meta-item" id="platformsSection" style="margin-top: 40px; text-align: center; width: 100%;">
              <label>Available Platforms</label>
              <div class="hero-actions" id="gameLinks" style="justify-content: center; margin-top: 16px;"></div>
            </div>

            <div id="screenshotSection" style="margin-top: 80px;">
              <h2>Screenshots</h2>
              <div class="screenshot-grid" id="screenshotGrid"></div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="shell footer-shell">
      <p>&copy; <span id="year">2026</span> Fkjaha Games</p>
    </div>
  </footer>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-nav lightbox-prev" id="lightboxPrev" aria-label="Previous screenshot">&lsaquo;</button>
    <img src="" alt="Fullscreen screenshot" id="lightboxImg">
    <button class="lightbox-nav lightbox-next" id="lightboxNext" aria-label="Next screenshot">&rsaquo;</button>
    <button class="lightbox-close" id="lightboxClose">&times;</button>
  </div>

  <script src="game.js"></script>
</body>

</html>
