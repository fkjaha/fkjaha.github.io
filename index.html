<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>Fkjaha Games</title>
  <link rel="icon" type="image/png"
    href="https://yt3.googleusercontent.com/ytc/AIdro_mmGv72A8cWtKlKcP1cpqlH56j5a9amsbI1IJMh0xa7Dw=s160-c-k-c0x00ffffff-no-rj">
  <meta name="description" content="Fkjaha Games - an indie game developer / studio based in Europe." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <a class="skip-link" href="#content">Skip to content</a>

  <header class="site-header" id="siteHeader">
    <div class="shell header-shell">
      <a href="index.html" class="brand">
        <div class="brand-text">
          <strong>Fkjaha Games</strong>
        </div>
      </a>

      <nav class="primary-nav">
        <a href="#games">Games</a>
        <a href="played-games.html">Top 50 Games</a>
        <a href="#contact">Contact</a>
      </nav>
    </div>
  </header>

  <main id="content">
    <section class="hero" id="top">
      <div class="shell hero-shell">
        <div class="hero-copy">
          <p class="eyebrow" id="heroEyebrow">Independent game developer studio</p>
          <h1 id="studioTitle">Fkjaha Games</h1>
          <p class="lead" id="studioLead">
            An indie developer creating games.
          </p>

          <div class="hero-actions" id="heroActions"></div>

          <dl class="hero-stats" id="heroStats"></dl>
        </div>


      </div>
    </section>

    <div class="lightning-divider"></div>

    <section class="section section-tight" id="games">
      <div class="shell">
        <div class="section-heading">

          <p class="eyebrow"></p>
          <h2>Games</h2>
        </div>

        <div class="section-list" id="sectionList"></div>
      </div>
    </section>

    <div class="lightning-divider"></div>

    <section class="section section-contact" id="contact">
      <div class="shell contact-shell">
        <p class="eyebrow">Contact</p>
        <h2>Business and press</h2>
        <p class="section-note">For publishing, collaboration, or coverage.</p>
        <div class="contact-links" id="contactLinks"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="shell footer-shell">
      <p id="footerText">© <span id="year"></span> Fkjaha Games.</p>
    </div>
  </footer>

  <script type="module" src="app.js"></script>
</body>

</html>
